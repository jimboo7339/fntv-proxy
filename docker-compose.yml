services:
  fntv-proxy:
    image: jimboo7339/fntv-proxy:latest
    container_name: fntv-proxy
    ports:
      - "28005:28005"
    volumes:
      # 挂载strm文件目录（根据实际路径修改）
      - /vol00:/vol00:ro
      # 可选：挂载日志目录（debug模式）
      # - ./logs:/app/logs
    environment:
      # 飞牛影视地址
      - TARGET_ADDR=http://127.0.0.1:8005
      # 日志级别: debug/info/warn/error
      - LOG_LEVEL=info
      # strm缓存过期时间 默认1小时
      - CACHE_TL=60
      # 日志目录（debug模式需要，info模式可省略）
      # - LOG_DIR=/app/logs
      # 或 America/New_York, Europe/London 等
      # - TZ=Asia/Shanghai
    restart: unless-stopped
    # 使用host网络可以访问本机8005
    # network_mode: host
